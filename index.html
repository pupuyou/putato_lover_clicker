<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Clicker Party!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <h1>Emoji Clicker!</h1>
        <div class="score-board">
            Score: <span id="totalScore">0</span>
        </div>

        <div class="button-group">
            <button id="btnBeaver" class="click-btn">
                <span class="emoji">🦫</span>
                <span class="count" id="countBeaver">0</span>
            </button>

            <button id="btnPotato" class="click-btn">
                <span class="emoji">🥔</span>
                <span class="count" id="countPotato">0</span>
            </button>

            <button id="btnHeart" class="click-btn">
                <span class="emoji">🫶</span>
                <span class="count" id="countHeart">0</span>
            </button>
        </div>
    </div>

    <audio id="sound1" src="click1.mp3" preload="auto"></audio>
    <audio id="sound2" src="click2.mp3" preload="auto"></audio>
    <audio id="sound3" src="click3.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
