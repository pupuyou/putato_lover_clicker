<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Clicker - Level Sounds</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="levelText">Level: 1</h1>
        <div class="score-board">
            <span id="score">0</span>
        </div>
        
        <button id="clickBtn">
            <p>CLICK!</p>
        </button>

        <p class="hint">กดไปเรื่อยๆ เพื่อเปลี่ยนเสียงนะคะ</p>
    </div>

    <audio id="sound1" src="click1.mp3" preload="auto"></audio>
    <audio id="sound2" src="click2.mp3" preload="auto"></audio>
    <audio id="sound3" src="click3.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
