<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Sound Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="button-grid">
            <button id="btn1" class="emoji-btn">🦫</button>

            <button id="btn2" class="emoji-btn">🥔</button>

            <button id="btn3" class="emoji-btn">🫶</button>
        </div>
    </div>

    <audio id="sound1" src="click1.mp3" preload="auto"></audio>
    <audio id="sound2" src="click2.mp3" preload="auto"></audio>
    <audio id="sound3" src="click3.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
